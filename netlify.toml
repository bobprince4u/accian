[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[redirects]]
  from = "http://accian.co.uk/*"
  to = "https://accian.co.uk/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.accian.co.uk/*"
  to = "https://accian.co.uk/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:; font-src 'self' https:; connect-src 'self' https://api.accian.co.uk https://www.google-analytics.com; frame-ancestors 'none'; form-action 'self'; upgrade-insecure-requests;"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), camera=(), microphone=()"
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    Pragma = "no-cache"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

    [[headers]]
  for = "/internal/*"
  [headers.values]
    X-Robots-Tag = "noindex"

[[redirects]]
  from = "/internal/*"
  to = "/internal/:splat"
  status = 200
  conditions = {Role = ["admin"]}